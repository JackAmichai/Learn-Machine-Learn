<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#12102a"/>
      <stop offset="100%" stop-color="#050511"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f2ff"/>
      <stop offset="100%" stop-color="#7000ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00f2ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="950" cy="160" r="320" fill="url(#glow)"/>

  <!-- faint grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <path d="M0 126 H1200"/><path d="M0 252 H1200"/><path d="M0 378 H1200"/><path d="M0 504 H1200"/>
    <path d="M150 0 V630"/><path d="M300 0 V630"/><path d="M450 0 V630"/><path d="M600 0 V630"/>
    <path d="M750 0 V630"/><path d="M900 0 V630"/><path d="M1050 0 V630"/>
  </g>

  <!-- brand mark -->
  <g transform="translate(80,70)">
    <rect width="64" height="64" rx="14" fill="#0a0a0f" stroke="url(#brand)" stroke-width="2"/>
    <g stroke="url(#brand)" stroke-width="1.8" opacity="0.9" stroke-linecap="round">
      <line x1="14" y1="20" x2="32" y2="16"/><line x1="14" y1="20" x2="32" y2="32"/><line x1="14" y1="20" x2="32" y2="48"/>
      <line x1="14" y1="32" x2="32" y2="16"/><line x1="14" y1="32" x2="32" y2="32"/><line x1="14" y1="32" x2="32" y2="48"/>
      <line x1="14" y1="44" x2="32" y2="16"/><line x1="14" y1="44" x2="32" y2="32"/><line x1="14" y1="44" x2="32" y2="48"/>
      <line x1="32" y1="16" x2="50" y2="26"/><line x1="32" y1="16" x2="50" y2="42"/>
      <line x1="32" y1="32" x2="50" y2="26"/><line x1="32" y1="32" x2="50" y2="42"/>
      <line x1="32" y1="48" x2="50" y2="26"/><line x1="32" y1="48" x2="50" y2="42"/>
    </g>
    <g fill="url(#brand)">
      <circle cx="14" cy="20" r="3.2"/><circle cx="14" cy="32" r="3.2"/><circle cx="14" cy="44" r="3.2"/>
      <circle cx="32" cy="16" r="3.2"/><circle cx="32" cy="32" r="3.2"/><circle cx="32" cy="48" r="3.2"/>
      <circle cx="50" cy="26" r="3.2"/><circle cx="50" cy="42" r="3.2"/>
    </g>
    <text x="84" y="42" font-family="Outfit, sans-serif" font-size="26" font-weight="700" fill="#e8e8f0">Learn Machine Learn</text>
  </g>

  <!-- headline -->
  <g font-family="Outfit, sans-serif" fill="#ffffff">
    <text x="80" y="240" font-size="84" font-weight="800" letter-spacing="-2">Interactive ML,</text>
    <text x="80" y="330" font-size="84" font-weight="800" letter-spacing="-2">in your browser.</text>
  </g>

  <!-- subline -->
  <text x="80" y="400" font-family="Inter, sans-serif" font-size="30" fill="#b8b8d0" font-weight="400">
    Train real neural networks on your own data · 40+ live visualizers
  </text>
  <text x="80" y="442" font-family="Inter, sans-serif" font-size="30" fill="#b8b8d0" font-weight="400">
    From gradient descent to diffusion · Free, open source, no sign-up
  </text>

  <!-- pills -->
  <g font-family="Inter, sans-serif" font-size="18" font-weight="600">
    <g transform="translate(80,510)">
      <rect width="210" height="48" rx="24" fill="none" stroke="#00f2ff" stroke-width="1.5" opacity="0.8"/>
      <text x="28" y="31" fill="#00f2ff">TensorFlow.js live</text>
    </g>
    <g transform="translate(310,510)">
      <rect width="180" height="48" rx="24" fill="none" stroke="#7000ff" stroke-width="1.5" opacity="0.8"/>
      <text x="28" y="31" fill="#c084fc">40+ visualizers</text>
    </g>
    <g transform="translate(510,510)">
      <rect width="170" height="48" rx="24" fill="none" stroke="#00ff9d" stroke-width="1.5" opacity="0.8"/>
      <text x="28" y="31" fill="#34d399">60+ quizzes</text>
    </g>
    <g transform="translate(700,510)">
      <rect width="260" height="48" rx="24" fill="none" stroke="#ff0055" stroke-width="1.5" opacity="0.8"/>
      <text x="28" y="31" fill="#ff6b8a">80+ curated resources</text>
    </g>
  </g>

  <!-- url -->
  <text x="80" y="600" font-family="Inter, sans-serif" font-size="18" fill="#6b6b8a">
    learn-machine-learn.vercel.app  ·  by Jack Amichai
  </text>
</svg>
