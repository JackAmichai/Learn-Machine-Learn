<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f2ff"/>
      <stop offset="100%" stop-color="#7000ff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0a0a0f"/>
  <!-- neural net: 3 layers, connecting lines then circles on top -->
  <g stroke="url(#g)" stroke-width="1.5" stroke-linecap="round" opacity="0.85">
    <!-- layer1 (x=14) to layer2 (x=32) -->
    <line x1="14" y1="20" x2="32" y2="16"/>
    <line x1="14" y1="20" x2="32" y2="32"/>
    <line x1="14" y1="20" x2="32" y2="48"/>
    <line x1="14" y1="32" x2="32" y2="16"/>
    <line x1="14" y1="32" x2="32" y2="32"/>
    <line x1="14" y1="32" x2="32" y2="48"/>
    <line x1="14" y1="44" x2="32" y2="16"/>
    <line x1="14" y1="44" x2="32" y2="32"/>
    <line x1="14" y1="44" x2="32" y2="48"/>
    <!-- layer2 (x=32) to layer3 (x=50) -->
    <line x1="32" y1="16" x2="50" y2="26"/>
    <line x1="32" y1="16" x2="50" y2="42"/>
    <line x1="32" y1="32" x2="50" y2="26"/>
    <line x1="32" y1="32" x2="50" y2="42"/>
    <line x1="32" y1="48" x2="50" y2="26"/>
    <line x1="32" y1="48" x2="50" y2="42"/>
  </g>
  <g fill="url(#g)">
    <circle cx="14" cy="20" r="3.2"/>
    <circle cx="14" cy="32" r="3.2"/>
    <circle cx="14" cy="44" r="3.2"/>
    <circle cx="32" cy="16" r="3.2"/>
    <circle cx="32" cy="32" r="3.2"/>
    <circle cx="32" cy="48" r="3.2"/>
    <circle cx="50" cy="26" r="3.2"/>
    <circle cx="50" cy="42" r="3.2"/>
  </g>
</svg>
